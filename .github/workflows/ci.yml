name: CI

on:
  push:
  pull_request:

jobs:
  unit-and-api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests (pytest)
        env:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          ADMIN_EMAIL: admin@test.com
          STRIPE_SECRET_KEY: sk_test_valid_fake_for_ci
          STRIPE_WEBHOOK_SECRET: whsec_test_fake_for_ci
        run: uv run pytest -q

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Tests (pytest, Postgres)
        env:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          ADMIN_EMAIL: admin@test.com
          STRIPE_SECRET_KEY: sk_test_valid_fake_for_ci
          STRIPE_WEBHOOK_SECRET: whsec_test_fake_for_ci
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ecommerce_test
        run: uv run pytest -q

