$kind: http-request
name: Admin Health
method: GET
url: '{{base_url}}/api/v1/admin/health'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response confirms admin access", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("admin", true);
      });
