$kind: http-request
name: Delete Product
method: DELETE
url: '{{base_url}}/api/v1/admin/products/{{admin_product_id}}'
order: 4000
pathVariables:
  - key: admin_product_id
    value: '1'
    description: 'ID of the product to delete (set automatically by Create Product test script)'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204 No Content", function () {
          pm.response.to.have.status(204);
      });
