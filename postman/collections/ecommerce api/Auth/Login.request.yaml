$kind: http-request
name: Login
method: POST
url: '{{base_url}}/api/v1/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: username
      value: 'user@example.com'
      description: 'OAuth2 password flow uses "username" field for the email address'
    - key: password
      value: 'password123'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has access_token", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("access_token").that.is.a("string");
          pm.expect(json).to.have.property("token_type", "bearer");
      });
      // Automatically store the token for use in other requests
      if (pm.response.code === 200) {
          const json = pm.response.json();
          pm.collectionVariables.set("auth_token", json.access_token);
          console.log("auth_token saved to collection variables");
      }
