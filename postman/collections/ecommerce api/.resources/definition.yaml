$kind: collection
name: E-Commerce API
description: |-
  FastAPI e-commerce backend (api-comerce-in).

  Base URL is controlled by the {{base_url}} variable.
  Authenticated endpoints require a Bearer token — run **Auth / Login** first,
  then copy the returned access_token into the {{auth_token}} variable (or use
  the collection-level pre-request script to do it automatically).

  Admin endpoints additionally require the account email to match ADMIN_EMAIL
  configured on the server.
variables:
  - key: base_url
    value: 'http://localhost:8000'
    description: Root URL of the running API server
  - key: auth_token
    value: ''
    description: 'Bearer token obtained from POST /api/v1/auth/login'
  - key: admin_email
    value: 'you@example.com'
    description: Admin account email (must match server ADMIN_EMAIL setting)
  - key: admin_password
    value: 'changeme123'
    description: Admin account password
